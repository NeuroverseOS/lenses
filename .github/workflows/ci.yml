name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (governance logic)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install only vitest — governance.ts has zero external dependencies.
      # Full npm ci requires @mentra/sdk (internal package, not on public npm).
      # When Mentra registry access is available, replace this with npm ci.
      - name: Install test runner
        run: npm install --no-save vitest

      - name: Test
        run: npx vitest run

